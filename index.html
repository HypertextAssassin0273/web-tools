<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Softwares at CalyxTech</title>
    <link rel="dns-prefetch" href="//cdn.calyxtech.net">
    <link rel="preconnect" href="https://cdn.calyxtech.net" crossorigin>
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" as="style">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="icon" type="image/png" sizes="32x32" href="https://cdn.calyxtech.net/shared/calyxtech-logo-32x32.png">
    
    <style>
        body { background-color: #f3f4f6; }
        .app-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; position: relative; }
        .app-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border-color: #3b82f6; }
        .dropzone { transition: border-color 0.2s, background-color 0.2s; }
        .dropzone.dragover { border-color: #3b82f6; background-color: #eff6ff; }
        #toast { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s; }
        .toast-hidden { opacity: 0; transform: translateY(100%); }
        .toast-visible { opacity: 1; transform: translateY(0); }
        
        .action-btns { opacity: 0; transition: opacity 0.2s; pointer-events: none; }
        .app-card:hover .action-btns { opacity: 1; pointer-events: auto; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans text-gray-900">
    
    <!-- Header -->
    <header class="bg-gray-900 text-white sticky top-0 z-40 shadow-lg">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center shadow-inner">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Softwares at CalyxTech</h1>
                    <p class="text-xs text-gray-400 font-medium">Internal Workbench Dashboard</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="toggleModal('settings-modal')" class="flex items-center gap-2 px-4 py-2 bg-gray-800 hover:bg-gray-700 text-sm font-semibold rounded-lg transition-colors border border-gray-700">
                    <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Settings
                </button>
                <button onclick="openUploadModal()" class="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold rounded-lg transition-colors shadow-md">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Publish Tool
                </button>
            </div>
        </div>
        
        <div class="bg-gray-800 border-t border-gray-700 p-3">
            <div class="container mx-auto px-4">
                <div class="relative max-w-2xl mx-auto">
                    <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="search-input" placeholder="Search tools, authors, or keywords..." class="w-full bg-gray-900 border border-gray-700 text-white placeholder-gray-400 text-sm rounded-lg pl-10 pr-4 py-2.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors" oninput="filterTools(this.value)">
                </div>
            </div>
        </div>
    </header>
    
    <!-- Grid -->
    <main class="flex-grow container mx-auto px-4 py-10">
        <section id="app-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- APPS_START -->
            <!-- APPS_END -->
        </section>
        
        <div id="no-results" class="hidden text-center py-20">
            <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h3 class="text-xl font-bold text-gray-700">No tools found</h3>
            <p class="text-gray-500 mt-2">Publish your first tool or adjust your search keywords.</p>
        </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 text-center py-6 border-t border-gray-800 mt-auto">
        <p class="text-sm">&copy; 2026 CalyxTech. All rights reserved.</p>
    </footer>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 backdrop-filter backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity">
        <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-md transform transition-all">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Repository Configuration</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Owner</label>
                        <input type="text" id="gh-owner" placeholder="calyxtech" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Repo</label>
                        <input type="text" id="gh-repo" placeholder="web-tools" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Branch</label>
                        <input type="text" id="gh-branch" placeholder="main" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Base Dir</label>
                        <input type="text" id="gh-dir" value="tools" class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
            </div>
            <div class="mt-8 flex justify-end gap-3">
                <button onclick="toggleModal('settings-modal')" class="px-5 py-2.5 text-sm font-semibold text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                <button onclick="saveSettings()" class="px-5 py-2.5 bg-blue-600 text-white text-sm font-semibold rounded-lg shadow-md">Save Settings</button>
            </div>
        </div>
    </div>

    <!-- Publish/Edit Modal -->
    <div id="upload-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 backdrop-filter backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-opacity">
        <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-2xl w-full max-w-xl transform transition-all overflow-y-auto max-h-screen no-scrollbar">
            <div class="flex justify-between items-center mb-6">
                <h2 id="upload-modal-title" class="text-2xl font-bold text-gray-900">Publish Tool</h2>
                <button onclick="toggleModal('upload-modal')" class="text-gray-400 hover:text-gray-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Tool Name</label>
                    <input type="text" id="tool-name" placeholder="JSON Formatter" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 font-bold text-gray-900 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Description</label>
                    <textarea id="tool-desc" rows="2" placeholder="Explain what this tool does..." class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none resize-none text-sm"></textarea>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Tags / Keywords (Optional)</label>
                    <input type="text" id="tool-tags" placeholder="Shahzaib, Developer, Images" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
                
                <div id="dropzone" class="dropzone border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer flex flex-col items-center justify-center bg-gray-50 hover:bg-gray-100">
                    <svg class="w-8 h-8 text-blue-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p id="dropzone-text" class="text-sm font-semibold text-gray-800">Browse or drop files here</p>
                    <input type="file" id="file-input" class="hidden" multiple webkitdirectory directory>
                </div>
                
                <div id="upload-status-container" class="hidden rounded-lg bg-blue-50 p-3 flex items-center gap-3">
                    <svg class="w-5 h-5 text-blue-600 animate-spin" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <p id="upload-status" class="text-sm font-semibold text-blue-700">Syncing...</p>
                </div>
                
                <div class="pt-4 border-t border-gray-200">
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">GitHub Personal Access Token</label>
                    <input type="password" id="gh-pat" placeholder="ghp_xxxxxxxxxxxx" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-mono">
                </div>
            </div>
            <div class="mt-8 flex flex-col sm:flex-row justify-between gap-3">
                <div id="delete-container" class="hidden">
                    <button onclick="handleDelete()" class="w-full sm:w-auto px-5 py-2.5 text-sm font-semibold text-red-600 hover:bg-red-50 rounded-lg border border-red-100 transition-colors">
                        Delete Tool
                    </button>
                </div>
                <div class="flex flex-col sm:flex-row gap-3">
                    <button onclick="toggleModal('upload-modal')" class="px-5 py-2.5 text-sm font-semibold text-gray-600 hover:bg-gray-100 rounded-lg">Cancel</button>
                    <button id="upload-btn" onclick="handleUpload()" class="px-5 py-2.5 bg-blue-600 text-white text-sm font-semibold rounded-lg shadow-md disabled:opacity-50">
                        Confirm & Sync
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Immersive Preview -->
    <div id="preview-modal" class="hidden fixed inset-0 z-50 flex flex-col bg-gray-900">
        <div class="h-14 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-4 text-white">
            <button onclick="closePreview()" class="px-3 py-1.5 hover:bg-gray-800 rounded-lg flex items-center gap-2 text-sm font-semibold text-gray-300 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Back to Dashboard
            </button>
            <h3 id="preview-title" class="font-bold text-sm hidden md:block">Tool Preview</h3>
            <a id="preview-external" href="#" target="_blank" class="px-3 py-1.5 hover:bg-gray-800 rounded-lg text-sm font-semibold text-gray-400 hover:text-white transition-colors flex items-center gap-2">
                Open in New Tab
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
            </a>
        </div>
        <div class="flex-grow bg-white">
            <iframe id="preview-iframe" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 right-6 bg-gray-900 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 toast-hidden z-50">
        <svg id="toast-icon" class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span id="toast-msg" class="font-medium text-sm">Action Complete</span>
    </div>

    <script>
        let config = { owner: '', repo: '', branch: 'main', dir: 'tools' };
        let selectedFiles = [];
        let editMode = { active: false, originalSlug: null, originalHref: null };

        // --- UI ---
        function toggleModal(id) {
            const modal = document.getElementById(id);
            if (!modal) return;
            modal.classList.toggle('hidden');
            if (id === 'upload-modal' && modal.classList.contains('hidden')) {
                resetUploadForm();
            }
        }

        function resetUploadForm() {
            editMode = { active: false, originalSlug: null, originalHref: null };
            document.getElementById('upload-modal-title').textContent = "Publish Tool";
            document.getElementById('tool-name').value = '';
            document.getElementById('tool-name').disabled = false;
            document.getElementById('tool-desc').value = '';
            document.getElementById('tool-tags').value = '';
            document.getElementById('gh-pat').value = '';
            document.getElementById('delete-container').classList.add('hidden');
            document.getElementById('dropzone-text').textContent = "Browse or drop files here";
            selectedFiles = [];
            setStatus('', false, false);
        }

        function checkEmptyState() {
            const hasCards = document.querySelectorAll('.app-card').length > 0;
            document.getElementById('app-grid').classList.toggle('hidden', !hasCards);
            document.getElementById('no-results').classList.toggle('hidden', hasCards);
        }

        function filterTools(query) {
            const lowerQuery = query.toLowerCase();
            const cards = document.querySelectorAll('.app-card');
            let visibleCount = 0;
            cards.forEach(card => {
                const search = (card.getAttribute('data-search') || "").toLowerCase();
                const isMatch = search.includes(lowerQuery);
                card.style.display = isMatch ? 'block' : 'none';
                if (isMatch) visibleCount++;
            });
            document.getElementById('no-results').style.display = visibleCount === 0 ? 'block' : 'none';
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.remove('toast-hidden');
            toast.classList.add('toast-visible');
            setTimeout(() => {
                toast.classList.remove('toast-visible');
                toast.classList.add('toast-hidden');
            }, 3000);
        }

        function setStatus(msg, isError = false, show = true) {
            const container = document.getElementById('upload-status-container');
            const el = document.getElementById('upload-status');
            if (!show) { container.classList.add('hidden'); return; }
            container.classList.remove('hidden');
            el.textContent = msg;
            el.className = `text-sm font-semibold ${isError ? 'text-red-700' : 'text-blue-700'}`;
        }

        // --- Interaction ---
        function openUploadModal() {
            resetUploadForm();
            toggleModal('upload-modal');
        }

        function editTool(event, slug, href) {
            event.preventDefault();
            event.stopPropagation();
            const card = document.querySelector(`a[href="${href}"]`);
            if (!card) return;

            editMode = { active: true, originalSlug: slug, originalHref: href };
            document.getElementById('upload-modal-title').textContent = "Edit Tool";
            document.getElementById('tool-name').value = card.querySelector('h2').textContent;
            document.getElementById('tool-name').disabled = true;
            document.getElementById('tool-desc').value = card.querySelector('p').textContent;
            
            const searchData = card.getAttribute('data-search');
            const name = card.querySelector('h2').textContent;
            const desc = card.querySelector('p').textContent;
            const tags = searchData.replace(name, '').replace(desc, '').trim();
            document.getElementById('tool-tags').value = tags;
            
            document.getElementById('delete-container').classList.remove('hidden');
            document.getElementById('dropzone-text').textContent = "Drop files only to replace code";
            toggleModal('upload-modal');
        }

        function copyToolLink(event, url) {
            event.preventDefault();
            event.stopPropagation();
            const fullUrl = `${window.location.origin}${window.location.pathname.replace('index.html', '')}${url.replace('./','')}`;
            const el = document.createElement('textarea');
            el.value = fullUrl;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast('Tool link copied!');
        }

        function openPreview(url, title) {
            document.getElementById('preview-modal').classList.remove('hidden');
            document.getElementById('preview-title').textContent = title;
            document.getElementById('preview-external').href = url;
            document.getElementById('preview-iframe').src = url;
            document.body.style.overflow = 'hidden';
        }

        function closePreview() {
            document.getElementById('preview-modal').classList.add('hidden');
            document.getElementById('preview-iframe').src = 'about:blank';
            document.body.style.overflow = '';
        }

        // --- Data ---
        function saveSettings() {
            config = {
                owner: document.getElementById('gh-owner').value.trim(),
                repo: document.getElementById('gh-repo').value.trim(),
                branch: document.getElementById('gh-branch').value.trim() || 'main',
                dir: document.getElementById('gh-dir').value.trim() || 'tools'
            };
            localStorage.setItem('ghToolsConfig', JSON.stringify(config));
            toggleModal('settings-modal');
            showToast('Settings updated.');
        }

        function loadSettings() {
            const saved = localStorage.getItem('ghToolsConfig');
            if (saved) {
                config = JSON.parse(saved);
                document.getElementById('gh-owner').value = config.owner || '';
                document.getElementById('gh-repo').value = config.repo || '';
                document.getElementById('gh-branch').value = config.branch || 'main';
                document.getElementById('gh-dir').value = config.dir || 'tools';
            }
        }

        // --- GitHub Logic ---
        const dropzone = document.getElementById('dropzone');
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', async (e) => {
            e.preventDefault(); dropzone.classList.remove('dragover');
            await processItems(e.dataTransfer.items);
        });
        dropzone.addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', async (e) => {
            await processFileList(e.target.files);
        });

        async function processItems(items) {
            setStatus("Preparing files...");
            selectedFiles = [];
            const queue = [];
            for (let i = 0; i < items.length; i++) {
                const entry = items[i].webkitGetAsEntry();
                if (entry) queue.push(entry);
            }
            while (queue.length > 0) {
                const entry = queue.shift();
                if (entry.isFile) {
                    const file = await new Promise(res => entry.file(res));
                    if (file.name.endsWith('.zip')) await processZip(file);
                    else selectedFiles.push({ path: entry.fullPath.replace(/^\//, ''), file });
                } else if (entry.isDirectory) {
                    const reader = entry.createReader();
                    const entries = await new Promise(res => reader.readEntries(res));
                    queue.push(...entries);
                }
            }
            setStatus(`Files ready: ${selectedFiles.length}`);
        }

        async function processFileList(files) {
            selectedFiles = [];
            for (let file of files) {
                if (file.name.endsWith('.zip')) await processZip(file);
                else selectedFiles.push({ path: file.webkitRelativePath || file.name, file });
            }
            setStatus(`Files ready: ${selectedFiles.length}`);
        }

        async function processZip(file) {
            const zip = await JSZip.loadAsync(file);
            for (const [path, zipEntry] of Object.entries(zip.files)) {
                if (!zipEntry.dir) {
                    const content = await zipEntry.async("blob");
                    selectedFiles.push({ path: path, file: content });
                }
            }
        }

        async function ghFetch(endpoint, options = {}) {
            const pat = document.getElementById('gh-pat').value.trim();
            if (!pat) throw new Error("GitHub PAT required for this action.");
            const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}${endpoint}`, {
                ...options,
                headers: { 'Authorization': `token ${pat}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json', ...(options.headers || {}) }
            });
            if (!res.ok) throw new Error(`GitHub API: ${res.statusText}`);
            return res.json();
        }

        async function handleDelete() {
            if (!confirm("Are you sure you want to remove this tool from the dashboard?")) return;
            try {
                document.getElementById('upload-btn').disabled = true;
                setStatus("Removing tool card...");

                const indexData = await ghFetch(`/contents/index.html?ref=${config.branch}`);
                const indexContent = decodeURIComponent(escape(atob(indexData.content)));
                
                const regex = new RegExp(`\\s*<a href="${editMode.originalHref}"[\\s\\S]*?<\/a>`, 'g');
                const updatedIndex = indexContent.replace(regex, '');

                const refData = await ghFetch(`/git/ref/heads/${config.branch}`);
                const commitSha = refData.object.sha;
                const commitData = await ghFetch(`/git/commits/${commitSha}`);
                const baseTreeSha = commitData.tree.sha;

                const indexBlob = await ghFetch(`/git/blobs`, { method: 'POST', body: JSON.stringify({ content: btoa(unescape(encodeURIComponent(updatedIndex))), encoding: 'base64' }) });
                const newTree = await ghFetch(`/git/trees`, { method: 'POST', body: JSON.stringify({ base_tree: baseTreeSha, tree: [{ path: 'index.html', mode: '100644', type: 'blob', sha: indexBlob.sha }] }) });
                const newCommit = await ghFetch(`/git/commits`, { method: 'POST', body: JSON.stringify({ message: `Delete tool: ${editMode.originalSlug}`, tree: newTree.sha, parents: [commitSha] }) });
                await ghFetch(`/git/refs/heads/${config.branch}`, { method: 'PATCH', body: JSON.stringify({ sha: newCommit.sha }) });

                showToast("Tool removed.");
                setTimeout(() => window.location.reload(), 1500);
            } catch (err) {
                setStatus(err.message, true);
                document.getElementById('upload-btn').disabled = false;
            }
        }

        async function handleUpload() {
            try {
                const name = document.getElementById('tool-name').value.trim();
                const desc = document.getElementById('tool-desc').value.trim();
                const tags = document.getElementById('tool-tags').value.trim();
                
                if (!name) return showToast("Name is required.", true);
                if (!editMode.active && selectedFiles.length === 0) return showToast("Files are required for new tools.", true);

                document.getElementById('upload-btn').disabled = true;
                const slug = editMode.active ? editMode.originalSlug : name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
                const basePath = `${config.dir}/${slug}`;

                setStatus("1/4: Authenticating...");
                const refData = await ghFetch(`/git/ref/heads/${config.branch}`);
                const commitSha = refData.object.sha;
                const commitData = await ghFetch(`/git/commits/${commitSha}`);
                const baseTreeSha = commitData.tree.sha;

                const treeItems = [];
                if (selectedFiles.length > 0) {
                    setStatus(`2/4: Uploading ${selectedFiles.length} files...`);
                    for (const sf of selectedFiles) {
                        const reader = new FileReader();
                        const contentBase64 = await new Promise(res => {
                            reader.onloadend = () => res(reader.result.split(',')[1]);
                            reader.readAsDataURL(sf.file);
                        });
                        const blobData = await ghFetch(`/git/blobs`, { method: 'POST', body: JSON.stringify({ content: contentBase64, encoding: 'base64' }) });
                        treeItems.push({ path: `${basePath}/${sf.path}`, mode: '100644', type: 'blob', sha: blobData.sha });
                    }
                }

                setStatus("3/4: Syncing Dashboard...");
                const indexData = await ghFetch(`/contents/index.html?ref=${config.branch}`);
                const indexContent = decodeURIComponent(escape(atob(indexData.content)));
                
                const toolUrl = `./${basePath}/index.html`;
                const avatar = ['bg-blue-50', 'bg-indigo-50', 'bg-emerald-50', 'bg-purple-50'][Math.floor(Math.random() * 4)];
                const textCol = avatar.replace('bg-', 'text-').replace('-50', '-600');
                const searchKeywords = `${name} ${desc} ${tags}`.trim();
                
                const newCardHTML = `\n            <a href="${toolUrl}" class="app-card group block bg-white border border-gray-200 rounded-xl p-5" data-search="${searchKeywords}">
                <div class="action-btns absolute top-3 right-3 flex gap-1 z-20">
                    <button onclick="editTool(event, '${slug}', '${toolUrl}')" class="p-2 bg-white/80 hover:bg-gray-100 rounded-lg text-gray-500 shadow-sm border border-gray-100" title="Edit Metadata">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-5M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                    </button>
                    <button onclick="copyToolLink(event, '${toolUrl}')" class="p-2 bg-white/80 hover:bg-blue-600 hover:text-white rounded-lg text-gray-500 shadow-sm border border-gray-100" title="Copy URL">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    </button>
                </div>
                <div class="flex items-start gap-4">
                    <div class="flex-shrink-0 w-12 h-12 rounded-lg ${avatar} ${textCol} flex items-center justify-center font-bold text-xl group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        ${name.charAt(0).toUpperCase()}
                    </div>
                    <div>
                        <h2 class="text-lg font-bold text-gray-900 group-hover:text-blue-600 transition-colors line-clamp-1">${name}</h2>
                        <p class="mt-1 text-sm text-gray-500 line-clamp-2 leading-relaxed">${desc}</p>
                    </div>
                </div>
            </a>`;
                
                let updatedIndex;
                if (editMode.active) {
                    const regex = new RegExp(`\\s*<a href="${editMode.originalHref}"[\\s\\S]*?<\/a>`, 'g');
                    updatedIndex = indexContent.replace(regex, newCardHTML);
                } else {
                    updatedIndex = indexContent.replace('<!-- APPS_END -->', `${newCardHTML}\n            <!-- APPS_END -->`);
                }

                const indexBlob = await ghFetch(`/git/blobs`, { method: 'POST', body: JSON.stringify({ content: btoa(unescape(encodeURIComponent(updatedIndex))), encoding: 'base64' }) });
                treeItems.push({ path: 'index.html', mode: '100644', type: 'blob', sha: indexBlob.sha });

                setStatus("4/4: Committing...");
                const newTree = await ghFetch(`/git/trees`, { method: 'POST', body: JSON.stringify({ base_tree: baseTreeSha, tree: treeItems }) });
                const newCommit = await ghFetch(`/git/commits`, { method: 'POST', body: JSON.stringify({ message: editMode.active ? `Update ${name}` : `Publish ${name}`, tree: newTree.sha, parents: [commitSha] }) });
                await ghFetch(`/git/refs/heads/${config.branch}`, { method: 'PATCH', body: JSON.stringify({ sha: newCommit.sha }) });

                showToast("Tool synced!");
                setTimeout(() => window.location.reload(), 1500);
            } catch (err) {
                setStatus(err.message, true);
                document.getElementById('upload-btn').disabled = false;
            }
        }

        // --- Init ---
        document.getElementById('app-grid').addEventListener('click', (e) => {
            const card = e.target.closest('.app-card');
            const action = e.target.closest('.action-btns');
            if (card && !action) {
                e.preventDefault();
                openPreview(card.getAttribute('href'), card.querySelector('h2').textContent);
            }
        });

        window.addEventListener('DOMContentLoaded', () => { loadSettings(); checkEmptyState(); });
    </script>
</body>
</html>
